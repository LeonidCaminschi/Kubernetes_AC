apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: calculator

resources:
  - namespace.yaml
  - postgres-secret.yaml
  - postgres-deployment.yaml
  - postgres-service.yaml
  - app-deployment.yaml
  - app-service.yaml

images:
  - name: calculator-app
    newName: ghcr.io/your-org/calculator-app
    newTag: 1.0.0